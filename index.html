<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método Comparativo Direto de Dados de Mercado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --bg-color: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 10px;
        }
        .logo {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .section {
            background: var(--light-color);
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .section h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }
        button {
            background: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .btn-group {
            text-align: center;
            margin-top: 20px;
        }
        .btn-success { background: var(--success-color); }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: var(--danger-color); }
        .btn-danger:hover { background: #c82333; }
        .comparavel {
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .report {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🏠 Laudo Imobiliário</div>
            <h1>Método Comparativo Direto de Dados de Mercado (MCDDM)</h1>
        </header>

        <form id="mcddmForm">
            <!-- Seção Imóvel Objeto -->
            <div class="section">
                <h2>1. Dados do Imóvel Objeto</h2>
                <div class="form-grid">
                    <div>
                        <label for="objetoEndereco">Endereço:</label>
                        <input type="text" id="objetoEndereco" required>
                    </div>
                    <div>
                        <label for="objetoArea">Área útil (m²):</label>
                        <input type="number" id="objetoArea" step="0.01" min="0" required>
                    </div>
                    <div>
                        <label for="objetoQuartos">Nº de Quartos:</label>
                        <input type="number" id="objetoQuartos" min="0" required>
                    </div>
                    <div>
                        <label for="objetoVagas">Vagas de Garagem:</label>
                        <input type="number" id="objetoVagas" min="0" required>
                    </div>
                </div>
            </div>

            <!-- Comparáveis -->
            <div class="section">
                <h2>2. Imóveis Comparáveis</h2>
                <div id="comparaveis">
                    <div class="comparavel" data-comp="1">
                        <h3>Comparável 1</h3>
                        <div class="form-grid">
                            <div>
                                <label>Endereço:</label>
                                <input type="text" data-comp="1" data-field="endereco" required>
                            </div>
                            <div>
                                <label>Área (m²):</label>
                                <input type="number" step="0.01" min="0" data-comp="1" data-field="area" required>
                            </div>
                            <div>
                                <label>Preço de Venda (R$):</label>
                                <input type="number" step="0.01" min="0" data-comp="1" data-field="preco" required>
                            </div>
                            <div>
                                <label>Ajuste Localização (%):</label>
                                <input type="number" step="0.01" data-comp="1" data-field="ajusteLoc" value="0">
                            </div>
                            <div>
                                <label>Ajuste Área (%):</label>
                                <input type="number" step="0.01" data-comp="1" data-field="ajusteArea" value="0">
                            </div>
                            <div>
                                <label>Ajuste Tempo (%):</label>
                                <input type="number" step="0.01" data-comp="1" data-field="ajusteTempo" value="0">
                            </div>
                        </div>
                    </div>
                    <!-- Repetir para 2 e 3 similarmente -->
                    <div class="comparavel" data-comp="2">
                        <h3>Comparável 2</h3>
                        <div class="form-grid">
                            <div><label>Endereço:</label><input type="text" data-comp="2" data-field="endereco" required></div>
                            <div><label>Área (m²):</label><input type="number" step="0.01" min="0" data-comp="2" data-field="area" required></div>
                            <div><label>Preço de Venda (R$):</label><input type="number" step="0.01" min="0" data-comp="2" data-field="preco" required></div>
                            <div><label>Ajuste Localização (%):</label><input type="number" step="0.01" data-comp="2" data-field="ajusteLoc" value="0"></div>
                            <div><label>Ajuste Área (%):</label><input type="number" step="0.01" data-comp="2" data-field="ajusteArea" value="0"></div>
                            <div><label>Ajuste Tempo (%):</label><input type="number" step="0.01" data-comp="2" data-field="ajusteTempo" value="0"></div>
                        </div>
                    </div>
                    <div class="comparavel" data-comp="3">
                        <h3>Comparável 3</h3>
                        <div class="form-grid">
                            <div><label>Endereço:</label><input type="text" data-comp="3" data-field="endereco" required></div>
                            <div><label>Área (m²):</label><input type="number" step="0.01" min="0" data-comp="3" data-field="area" required></div>
                            <div><label>Preço de Venda (R$):</label><input type="number" step="0.01" min="0" data-comp="3" data-field="preco" required></div>
                            <div><label>Ajuste Localização (%):</label><input type="number" step="0.01" data-comp="3" data-field="ajusteLoc" value="0"></div>
                            <div><label>Ajuste Área (%):</label><input type="number" step="0.01" data-comp="3" data-field="ajusteArea" value="0"></div>
                            <div><label>Ajuste Tempo (%):</label><input type="number" step="0.01" data-comp="3" data-field="ajusteTempo" value="0"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" id="salvar">Salvar Dados</button>
                <button type="button" id="carregar">Carregar Dados</button>
                <button type="button" id="gerarPDF">Gerar PDF</button>
                <button type="submit" id="enviar">Enviar para Webhook</button>
                <button type="button" id="limpar">Limpar Tudo</button>
            </div>
        </form>

        <div id="report" class="section report">
            <h2>Relatório Gerado</h2>
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://bleatingfrilledlizard-n8n.cloudfy.live/webhook-test/mcddm';

        // Audio beep
        function playBeep() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Salvar em localStorage
        function salvarDados() {
            const formData = {
                objeto: {
                    endereco: document.getElementById('objetoEndereco').value,
                    area: document.getElementById('objetoArea').value,
                    quartos: document.getElementById('objetoQuartos').value,
                    vagas: document.getElementById('objetoVagas').value
                },
                comparaveis: {}
            };
            for (let i = 1; i <= 3; i++) {
                formData.comparaveis[i] = {
                    endereco: document.querySelector(`[data-comp='${i}'][data-field='endereco']`).value,
                    area: document.querySelector(`[data-comp='${i}'][data-field='area']`).value,
                    preco: document.querySelector(`[data-comp='${i}'][data-field='preco']`).value,
                    ajusteLoc: document.querySelector(`[data-comp='${i}'][data-field='ajusteLoc']`).value,
                    ajusteArea: document.querySelector(`[data-comp='${i}'][data-field='ajusteArea']`).value,
                    ajusteTempo: document.querySelector(`[data-comp='${i}'][data-field='ajusteTempo']`).value
                };
            }
            localStorage.setItem('mcddmData', JSON.stringify(formData));
            playBeep();
            alert('Dados salvos!');
        }

        // Carregar de localStorage
        function carregarDados() {
            const saved = localStorage.getItem('mcddmData');
            if (saved) {
                const formData = JSON.parse(saved);
                document.getElementById('objetoEndereco').value = formData.objeto.endereco || '';
                document.getElementById('objetoArea').value = formData.objeto.area || '';
                document.getElementById('objetoQuartos').value = formData.objeto.quartos || '';
                document.getElementById('objetoVagas').value = formData.objeto.vagas || '';
                for (let i = 1; i <= 3; i++) {
                    const comp = formData.comparaveis[i];
                    if (comp) {
                        document.querySelector(`[data-comp='${i}'][data-field='endereco']`).value = comp.endereco || '';
                        document.querySelector(`[data-comp='${i}'][data-field='area']`).value = comp.area || '';
                        document.querySelector(`[data-comp='${i}'][data-field='preco']`).value = comp.preco || '';
                        document.querySelector(`[data-comp='${i}'][data-field='ajusteLoc']`).value = comp.ajusteLoc || '0';
                        document.querySelector(`[data-comp='${i}'][data-field='ajusteArea']`).value = comp.ajusteArea || '0';
                        document.querySelector(`[data-comp='${i}'][data-field='ajusteTempo']`).value = comp.ajusteTempo || '0';
                    }
                }
                playBeep();
                alert('Dados carregados!');
            } else {
                alert('Nenhum dado salvo.');
            }
        }

        // Limpar
        function limparTudo() {
            if (confirm('Tem certeza que deseja limpar todos os dados?')) {
                document.getElementById('mcddmForm').reset();
                localStorage.removeItem('mcddmData');
                playBeep();
            }
        }

        // Validação
        function validarForm() {
            const required = document.querySelectorAll('[required]');
            for (let input of required) {
                if (!input.value.trim()) {
                    alert('Preencha todos os campos obrigatórios!');
                    input.focus();
                    return false;
                }
            }
            // Verificar números
            const nums = document.querySelectorAll('input[type=number]');
            for (let num of nums) {
                if (num.value && (isNaN(num.value) || parseFloat(num.value) < 0)) {
                    alert('Valores numéricos inválidos!');
                    num.focus();
                    return false;
                }
            }
            return true;
        }

        // Gerar relatório e PDF
        async function gerarPDF() {
            if (!validarForm()) return;

            const data = coletarDados();
            let reportHtml = `
                <h2>Laudo - MCDDM</h2>
                <p><strong>Imóvel Objeto:</strong> ${data.objeto.endereco}, Área: ${data.objeto.area} m²</p>
            `;
            let precosAjustados = [];
            for (let i = 1; i <= 3; i++) {
                const comp = data.comparaveis[i];
                const precoBase = parseFloat(comp.preco);
                const fatorLoc = 1 + (parseFloat(comp.ajusteLoc) / 100);
                const fatorArea = 1 + (parseFloat(comp.ajusteArea) / 100);
                const fatorTempo = 1 + (parseFloat(comp.ajusteTempo) / 100);
                const precoAjustado = precoBase * fatorLoc * fatorArea * fatorTempo;
                precosAjustados.push(precoAjustado);
                const precoM2 = (precoAjustado / parseFloat(comp.area)).toFixed(2);
                reportHtml += `
                    <p><strong>Comparável ${i}:</strong> ${comp.endereco}, Área: ${comp.area} m², Preço Ajustado: R$ ${precoAjustado.toLocaleString()}, R$/m²: ${precoM2}</p>
                `;
            }
            const media = precosAjustados.reduce((a, b) => a + b, 0) / 3;
            const valorObjeto = (media / parseFloat(data.objeto.area)).toFixed(2);
            reportHtml += `
                <p><strong>Média Preços Ajustados:</strong> R$ ${media.toLocaleString()}</p>
                <p><strong>Valor Estimado do Objeto (R$/m²):</strong> R$ ${valorObjeto}</p>
            `;

            document.getElementById('reportContent').innerHTML = reportHtml;
            document.getElementById('report').style.display = 'block';

            // PDF
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            const element = document.getElementById('report');
            await html2canvas(element).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                pdf.addImage(imgData, 'PNG', 10, 10, 190, 277);
                pdf.save('laudo_mcddm.pdf');
            });
            playBeep();
        }

        // Coletar dados
        function coletarDados() {
            const data = {
                objeto: {
                    endereco: document.getElementById('objetoEndereco').value,
                    area: document.getElementById('objetoArea').value,
                    quartos: document.getElementById('objetoQuartos').value,
                    vagas: document.getElementById('objetoVagas').value
                },
                comparaveis: {}
            };
            for (let i = 1; i <= 3; i++) {
                data.comparaveis[i] = {
                    endereco: document.querySelector(`[data-comp='${i}'][data-field='endereco']`).value,
                    area: document.querySelector(`[data-comp='${i}'][data-field='area']`).value,
                    preco: document.querySelector(`[data-comp='${i}'][data-field='preco']`).value,
                    ajusteLoc: document.querySelector(`[data-comp='${i}'][data-field='ajusteLoc']`).value,
                    ajusteArea: document.querySelector(`[data-comp='${i}'][data-field='ajusteArea']`).value,
                    ajusteTempo: document.querySelector(`[data-comp='${i}'][data-field='ajusteTempo']`).value
                };
            }
            return data;
        }

        // Enviar webhook
        async function enviarWebhook() {
            if (!validarForm()) return;

            const data = coletarDados();
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    playBeep();
                    alert('Dados enviados com sucesso!');
                } else {
                    alert('Erro ao enviar: ' + response.status);
                }
            } catch (error) {
                alert('Erro de rede: ' + error.message);
            }
        }

        // Event listeners
        document.getElementById('salvar').addEventListener('click', salvarDados);
        document.getElementById('carregar').addEventListener('click', carregarDados);
        document.getElementById('limpar').addEventListener('click', limparTudo);
        document.getElementById('gerarPDF').addEventListener('click', gerarPDF);
        document.getElementById('mcddmForm').addEventListener('submit', (e) => {
            e.preventDefault();
            enviarWebhook();
        });

        // Auto-save on change
        document.querySelectorAll('input, select, textarea').forEach(input => {
            input.addEventListener('change', salvarDados);
        });

        // Load on start
        window.addEventListener('load', carregarDados);
    </script>
</body>
</html>
